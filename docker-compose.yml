services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production-use-env-var}
      - VAULT_FERNET_KEY=${VAULT_FERNET_KEY:-}
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:////data/vault.db
    volumes:
      - vault_data:/data
    restart: unless-stopped
    # Read-only filesystem — only /data and /tmp are writable
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  vault_data:
